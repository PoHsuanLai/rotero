<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Rotero — A fast, private, local-first paper reading app built with Rust. The modern alternative to Zotero." />
		<meta name="theme-color" content="#0f172a" />
		<link rel="icon" href="%sveltekit.assets%/icon.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet" />
		<title>Rotero — Research, refined.</title>
		<script>
			// Prevent flash: apply saved theme before render
			(function() {
				const saved = localStorage.getItem('rotero-theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const theme = saved || (prefersDark ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
