<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotero</title>
  <link rel="stylesheet" href="taskpane.css">
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div class="connection-banner" id="connectionBanner">
    Rotero is not running. Please start the Rotero app.
  </div>

  <nav class="nav">
    <button class="active" data-view="cite" id="navCite">Cite</button>
    <button data-view="bibliography" id="navBib">Bibliography</button>
    <button data-view="refresh" id="navRefresh">Refresh</button>
  </nav>

  <!-- Cite view -->
  <div class="view active" id="viewCite">
    <input type="text" class="search-box" id="searchInput" placeholder="Search papers by title, author, DOI...">
    <div class="results" id="searchResults">
      <div class="empty-state">Type to search your Rotero library</div>
    </div>
    <div class="style-row">
      <label for="styleSelect">Style:</label>
      <select id="styleSelect"></select>
    </div>
    <button class="btn btn-primary" id="insertCiteBtn" disabled>Insert Citation</button>
    <div class="status" id="citeStatus"></div>
  </div>

  <!-- Bibliography view -->
  <div class="view" id="viewBibliography">
    <h2>Bibliography</h2>
    <p class="status">Papers cited in this document:</p>
    <div class="bib-entries" id="bibEntries">
      <div class="empty-state">No citations found in this document</div>
    </div>
    <div class="style-row">
      <label for="bibStyleSelect">Style:</label>
      <select id="bibStyleSelect"></select>
    </div>
    <button class="btn btn-primary" id="insertBibBtn">Insert Bibliography</button>
    <div class="status" id="bibStatus"></div>
  </div>

  <!-- Refresh view -->
  <div class="view" id="viewRefresh">
    <h2>Refresh Citations</h2>
    <p class="status" style="margin-bottom:12px">Update all citations and bibliography to a new style.</p>
    <div class="style-row">
      <label for="refreshStyleSelect">Style:</label>
      <select id="refreshStyleSelect"></select>
    </div>
    <button class="btn btn-primary" id="refreshBtn">Refresh All</button>
    <div class="status" id="refreshStatus"></div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
