<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 12px 0; }
    .status { padding: 8px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .result { margin-top: 12px; padding: 8px; border-radius: 6px; font-size: 13px; }
    .result.success { background: #d4edda; color: #155724; }
    .result.fail { background: #f8d7da; color: #721c24; }
    .meta { margin-top: 12px; font-size: 12px; color: #666; }
    .meta div { margin-bottom: 4px; }
    .meta strong { color: #333; }
  </style>
</head>
<body>
  <h1>Rotero Connector</h1>
  <div id="status" class="status">Checking connection...</div>
  <div id="meta" class="meta" style="display:none;"></div>
  <button id="saveBtn" disabled>Save to Rotero</button>
  <div id="result" class="result" style="display:none;"></div>

  <script src="popup.js"></script>
</body>
</html>
