name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Download PDFium
        run: |
          mkdir -p lib
          TMP=$(mktemp -d)
          curl -sL "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.tgz" -o "$TMP/pdfium.tgz"
          tar -xzf "$TMP/pdfium.tgz" -C "$TMP"
          cp "$TMP/lib/libpdfium.dylib" lib/libpdfium.dylib
          rm -rf "$TMP"

      - name: Bundle app
        run: PDFIUM_DYNAMIC_LIB_PATH="$PWD/lib" dx bundle --release

      - name: Prepare and sign app bundle
        run: |
          APP_PATH="target/dx/rotero/release/macos/Rotero.app"
          PLIST="$APP_PATH/Contents/Info.plist"
          VERSION="${GITHUB_REF_NAME#v}"

          # Copy PDFium into the app bundle so it's self-contained
          cp lib/libpdfium.dylib "$APP_PATH/Contents/MacOS/"
          install_name_tool -add_rpath @executable_path "$APP_PATH/Contents/MacOS/rotero" 2>/dev/null || true

          # Copy app icon
          cp assets/icon.icns "$APP_PATH/Contents/Resources/icon.icns"

          # Patch Info.plist: Retina support, version from tag
          /usr/libexec/PlistBuddy -c "Add :NSHighResolutionCapable bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"

          # Strip quarantine and ad-hoc codesign
          xattr -cr "$APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Create DMG with drag-to-install
        run: |
          npm install -g create-dmg
          APP_PATH="target/dx/rotero/release/macos/Rotero.app"
          DMG_NAME="Rotero-${{ github.ref_name }}-macos-arm64.dmg"

          # create-dmg automatically adds an Applications symlink and
          # sets up the drag-to-install layout
          create-dmg "$APP_PATH" --dmg-title="Rotero" || true
          # create-dmg names the output based on the app, rename it
          mv Rotero*.dmg "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: dmg-macos-arm64
          path: ${{ env.DMG_NAME }}

  release:
    name: Create Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dmg-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.dmg"
